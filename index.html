<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DebtTrack</title>
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and Babel for running React in a single file -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;
        
        // Icon Component to make Lucide work in this simple setup
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                lucide.createIcons();
            }, []);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const translations = {
            en: { title: 'DebtTrack', netBalance: 'Net Balance', owedToMe: 'Owed to Me', iOwe: 'I Owe', all: 'All', newEntry: 'New Entry', whoIsIt: 'Who is it?', amount: 'Amount', category: 'Category', note: 'Note', save: 'Save Entry', placeholderName: 'e.g. John', placeholderNote: 'Why?', noDebts: 'No debts.', owedToMeLabel: 'Owed to me', iOweLabel: 'I owe' },
            ru: { title: 'Долги', netBalance: 'Баланс', owedToMe: 'Мне должны', iOwe: 'Я должен', all: 'Все', newEntry: 'Новая запись', whoIsIt: 'Кто?', amount: 'Сумма', category: 'Категория', note: 'Заметка', save: 'Сохранить', placeholderName: 'напр. Иван', placeholderNote: 'За что?', noDebts: 'Пусто.', owedToMeLabel: 'Мне должны', iOweLabel: 'Я должен' },
            uz: { title: 'Qarzlar', netBalance: 'Balans', owedToMe: 'Menga qarz', iOwe: 'Men qarzman', all: 'Hammasi', newEntry: 'Yangi yozuv', whoIsIt: 'Kim?', amount: 'Summa', category: 'Turkum', note: 'Izoh', save: 'Saqlash', placeholderName: 'masalan, Ali', placeholderNote: 'Nima uchun?', noDebts: 'Topilmadi.', owedToMeLabel: 'Menga qarz', iOweLabel: 'Men qarzman' }
        };

        function App() {
            const [lang, setLang] = useState('en');
            const [debts, setDebts] = useState([]);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [filter, setFilter] = useState('all');
            const [formData, setFormData] = useState({ name: '', amount: '', type: 'owed_to_me', note: '' });

            const t = translations[lang];

            const stats = useMemo(() => {
                const owedToMe = debts.filter(d => d.type === 'owed_to_me' && !d.completed).reduce((acc, curr) => acc + Number(curr.amount), 0);
                const iOwe = debts.filter(d => d.type === 'i_owe' && !d.completed).reduce((acc, curr) => acc + Number(curr.amount), 0);
                return { owedToMe, iOwe, balance: owedToMe - iOwe };
            }, [debts]);

            const addDebt = (e) => {
                e.preventDefault();
                if (!formData.name || !formData.amount) return;
                setDebts([{ ...formData, id: Date.now(), amount: parseFloat(formData.amount), completed: false, date: new Date().toLocaleDateString() }, ...debts]);
                setFormData({ name: '', amount: '', type: 'owed_to_me', note: '' });
                setIsModalOpen(false);
            };

            return (
                <div className="min-h-screen pb-20">
                    <header className="bg-white border-b p-4 sticky top-0 z-10 flex justify-between items-center">
                        <div className="flex items-center gap-2 text-indigo-600">
                            <Icon name="wallet" />
                            <h1 className="text-xl font-bold text-slate-900">{t.title}</h1>
                        </div>
                        <div className="flex gap-2">
                            <select value={lang} onChange={(e) => setLang(e.target.value)} className="bg-slate-100 text-xs font-bold rounded p-1 uppercase">
                                <option value="en">EN</option>
                                <option value="ru">RU</option>
                                <option value="uz">UZ</option>
                            </select>
                            <button onClick={() => setIsModalOpen(true)} className="bg-indigo-600 text-white p-2 rounded-full"><Icon name="plus" /></button>
                        </div>
                    </header>

                    <main className="max-w-md mx-auto p-4 space-y-4">
                        <div className="bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
                            <p className="text-slate-500 text-sm">{t.netBalance}</p>
                            <p className={`text-3xl font-bold ${stats.balance >= 0 ? 'text-emerald-600' : 'text-rose-600'}`}>${stats.balance}</p>
                        </div>

                        <div className="grid grid-cols-2 gap-3">
                            <div className="bg-white p-3 rounded-xl border border-slate-200">
                                <p className="text-xs text-slate-500">{t.owedToMe}</p>
                                <p className="text-lg font-bold text-emerald-600">${stats.owedToMe}</p>
                            </div>
                            <div className="bg-white p-3 rounded-xl border border-slate-200">
                                <p className="text-xs text-slate-500">{t.iOwe}</p>
                                <p className="text-lg font-bold text-rose-600">${stats.iOwe}</p>
                            </div>
                        </div>

                        <div className="space-y-3">
                            {debts.length === 0 ? <p className="text-center text-slate-400 py-10">{t.noDebts}</p> : 
                                debts.map(debt => (
                                    <div key={debt.id} className={`bg-white p-4 rounded-xl border flex items-center gap-3 ${debt.completed ? 'opacity-50' : ''}`}>
                                        <button onClick={() => setDebts(debts.map(d => d.id === debt.id ? {...d, completed: !d.completed} : d))}>
                                            <Icon name={debt.completed ? "check-circle" : "circle"} className={debt.completed ? "text-emerald-500" : "text-slate-300"} />
                                        </button>
                                        <div className="flex-1">
                                            <p className={`font-bold ${debt.completed ? 'line-through' : ''}`}>{debt.name}</p>
                                            <p className="text-xs text-slate-400">{debt.type === 'owed_to_me' ? t.owedToMeLabel : t.iOweLabel}</p>
                                        </div>
                                        <p className={`font-bold ${debt.type === 'owed_to_me' ? 'text-emerald-600' : 'text-rose-600'}`}>
                                            {debt.type === 'owed_to_me' ? '+' : '-'}${debt.amount}
                                        </p>
                                    </div>
                                ))
                            }
                        </div>
                    </main>

                    {isModalOpen && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
                            <div className="bg-white w-full max-w-sm rounded-2xl p-6">
                                <div className="flex justify-between mb-4">
                                    <h2 className="text-lg font-bold">{t.newEntry}</h2>
                                    <button onClick={() => setIsModalOpen(false)}><Icon name="x" /></button>
                                </div>
                                <form onSubmit={addDebt} className="space-y-3">
                                    <input required className="w-full bg-slate-100 p-3 rounded-lg" placeholder={t.placeholderName} onChange={e => setFormData({...formData, name: e.target.value})} />
                                    <input required type="number" className="w-full bg-slate-100 p-3 rounded-lg" placeholder="0.00" onChange={e => setFormData({...formData, amount: e.target.value})} />
                                    <select className="w-full bg-slate-100 p-3 rounded-lg" onChange={e => setFormData({...formData, type: e.target.value})}>
                                        <option value="owed_to_me">{t.owedToMeLabel}</option>
                                        <option value="i_owe">{t.iOweLabel}</option>
                                    </select>
                                    <button type="submit" className="w-full bg-indigo-600 text-white p-3 rounded-lg font-bold">{t.save}</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
